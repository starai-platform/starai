openapi: 3.0.3
info:
  title: StarAI Platform API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
  /api/auth/login/password:
    post:
      summary: User login
  /api/models:
    get:
      summary: List public models
  /api/chat/completions:
    post:
      summary: Chat completion (supports SSE stream)
  /api/tasks:
    post:
      summary: Create async task
  /api/recharge/card:
    post:
      summary: Redeem card
  /api/payment/orders:
    post:
      summary: Create a mock-paid or external pending payment order
  /api/payment/orders/{order_no}:
    get:
      summary: Get the authenticated user's payment order status
  /api/payment/webhooks/generic:
    post:
      summary: Confirm a generic external payment using timestamped HMAC-SHA256
  /api/payment/webhooks/stripe:
    post:
      summary: Receive and verify Stripe Checkout events
  /api/payment/webhooks/paypal:
    post:
      summary: Receive and verify PayPal Orders/Capture events
  /admin/api/login:
    post:
      summary: Admin login
  /admin/api/models:
    post:
      summary: Create model
