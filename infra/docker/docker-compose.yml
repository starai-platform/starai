services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starai
      POSTGRES_PASSWORD: starai
      POSTGRES_DB: starai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: starai
      MINIO_ROOT_PASSWORD: starai123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-new-api:
    build:
      context: ../../services/mock-new-api
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MOCK_FAILURE_RATE: "0"

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://starai:starai@postgres:5432/starai?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: starai
      MINIO_SECRET_KEY: starai123
      MINIO_BUCKET: starai-works
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:9000
      JWT_SECRET: dev-jwt-secret-starai
      ADMIN_JWT_SECRET: dev-admin-jwt-secret
      NEW_API_BASE_URL: http://mock-new-api:3002
      NEW_API_TOKEN: change-me-dev-model-gateway-token
      API_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      mock-new-api:
        condition: service_started

  worker:
    build:
      context: ../../services/worker
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://starai:starai@postgres:5432/starai?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: starai
      MINIO_SECRET_KEY: starai123
      MINIO_BUCKET: starai-works
      MINIO_USE_SSL: "false"
      NEW_API_BASE_URL: http://mock-new-api:3002
      NEW_API_TOKEN: change-me-dev-model-gateway-token
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      mock-new-api:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
